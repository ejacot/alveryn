services:
  postgres:
    image: postgres:17

    container_name: roomly-postgres

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - roomly-postgres-data:/var/lib/postgresql/data

    networks:
      - roomly-network

volumes:
  roomly-postgres-data:
    name: roomly-postgres-data

networks:
  roomly-network:
    name: roomly-network
