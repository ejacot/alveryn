spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/alveryn?currentSchema=alveryn_test}
    username: ${DB_USERNAME:alveryn}
    password: ${DB_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: alveryn_test
  flyway:
    default-schema: alveryn_test
    schemas: alveryn_test
    create-schemas: true

server:
  port: 0

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

alveryn:
  founder:
    email: ""
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-origin-patterns:
      - http://192.168.*:5173
  auth:
    jwt-secret: test-jwt-secret-012345678901234567890123
    access-token-lifetime: 15m
    refresh-token-lifetime: 30d
    email-verification-code-lifetime: 15m
    password-reset-code-lifetime: 30m
    verification-resend-cooldown: 1m
    login-max-failed-attempts: 5
    login-lock-duration: 15m
    oauth:
      google:
        client-id: test-google-client
        client-secret: test-google-secret
        redirect-uri: http://localhost/api/auth/oauth/google/callback
        frontend-success-url: http://localhost:5173/auth/oauth/callback
        frontend-failure-url: http://localhost:5173/login?oauth=error
    refresh-cookie:
      secure: false
