spring:
  application:
    name: alveryn-api
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alveryn}
    username: ${DB_USERNAME:alveryn}
    password: ${DB_PASSWORD:change-me}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

alveryn:
  founder:
    email: ${FOUNDER_EMAIL:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  auth:
    jwt-secret: ${JWT_SECRET}
    access-token-lifetime: ${ACCESS_TOKEN_LIFETIME:15m}
    refresh-token-lifetime: ${REFRESH_TOKEN_LIFETIME:30d}
    email-verification-code-lifetime: ${EMAIL_VERIFICATION_CODE_LIFETIME:15m}
    password-reset-code-lifetime: ${PASSWORD_RESET_CODE_LIFETIME:30m}
    verification-resend-cooldown: ${VERIFICATION_RESEND_COOLDOWN:1m}
    login-max-failed-attempts: ${LOGIN_MAX_FAILED_ATTEMPTS:5}
    login-lock-duration: ${LOGIN_LOCK_DURATION:15m}
    frontend-verification-url: ${FRONTEND_VERIFICATION_URL:}
    oauth:
      google:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
        client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:}
        frontend-success-url: ${GOOGLE_OAUTH_FRONTEND_SUCCESS_URL:http://localhost:5173/auth/oauth/callback}
        frontend-failure-url: ${GOOGLE_OAUTH_FRONTEND_FAILURE_URL:http://localhost:5173/login?oauth=error}
    refresh-cookie:
      name: ${REFRESH_COOKIE_NAME:alveryn_refresh_token}
      path: ${REFRESH_COOKIE_PATH:/api/auth}
      same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
      secure: ${REFRESH_COOKIE_SECURE:true}
