spring:
  application:
    name: roomly-api
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/roomly}
    username: ${DB_USERNAME:roomly}
    password: ${DB_PASSWORD:change-me}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

roomly:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  auth:
    jwt-secret: ${JWT_SECRET}
    access-token-lifetime: ${ACCESS_TOKEN_LIFETIME:15m}
    refresh-token-lifetime: ${REFRESH_TOKEN_LIFETIME:30d}
    email-verification-code-lifetime: ${EMAIL_VERIFICATION_CODE_LIFETIME:15m}
    password-reset-code-lifetime: ${PASSWORD_RESET_CODE_LIFETIME:30m}
    verification-resend-cooldown: ${VERIFICATION_RESEND_COOLDOWN:1m}
    login-max-failed-attempts: ${LOGIN_MAX_FAILED_ATTEMPTS:5}
    login-lock-duration: ${LOGIN_LOCK_DURATION:15m}
    frontend-verification-url: ${FRONTEND_VERIFICATION_URL:}
    refresh-cookie:
      name: ${REFRESH_COOKIE_NAME:roomly_refresh_token}
      path: ${REFRESH_COOKIE_PATH:/api/auth}
      same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
      secure: ${REFRESH_COOKIE_SECURE:true}
  imports:
    excel:
      max-file-size-bytes: ${ROOMLY_IMPORTS_EXCEL_MAX_FILE_SIZE_BYTES:10485760}
      max-sheets: ${ROOMLY_IMPORTS_EXCEL_MAX_SHEETS:24}
      max-rows-per-sheet: ${ROOMLY_IMPORTS_EXCEL_MAX_ROWS_PER_SHEET:1000}
      max-total-rows: ${ROOMLY_IMPORTS_EXCEL_MAX_TOTAL_ROWS:12000}
      max-warnings: ${ROOMLY_IMPORTS_EXCEL_MAX_WARNINGS:50}
      max-filename-length: ${ROOMLY_IMPORTS_EXCEL_MAX_FILENAME_LENGTH:255}
      preview-token-lifetime: ${ROOMLY_IMPORTS_EXCEL_PREVIEW_TOKEN_LIFETIME:15m}
