spring:
  application:
    name: roomly-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/roomly}
    username: ${DB_USERNAME:roomly}
    password: ${DB_PASSWORD:change-me}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
