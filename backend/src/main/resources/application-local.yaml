spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:roomly000app@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_STARTTLS:true}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

roomly:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
    allowed-origin-patterns:
      - http://192.168.*:5173
      - http://10.*:5173
      - http://172.*:5173
  auth:
    jwt-secret: local-development-jwt-secret-32-bytes-minimum
    refresh-cookie:
      secure: false
  imports:
    excel:
      max-file-size-bytes: 10485760
