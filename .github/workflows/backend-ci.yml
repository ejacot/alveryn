name: Backend CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: roomly
          POSTGRES_USER: roomly
          POSTGRES_PASSWORD: roomly_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roomly -d roomly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: jdbc:postgresql://localhost:5432/roomly
      DB_USERNAME: roomly
      DB_PASSWORD: roomly_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Make Maven wrapper executable
        run: chmod +x mvnw
      - name: Verify backend
        run: ./mvnw --batch-mode clean verify
