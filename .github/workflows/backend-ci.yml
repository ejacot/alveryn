name: Backend CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: alveryn
          POSTGRES_USER: alveryn
          POSTGRES_PASSWORD: alveryn_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alveryn -d alveryn"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: jdbc:postgresql://localhost:5432/alveryn
      DB_USERNAME: alveryn
      DB_PASSWORD: alveryn_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Make Maven wrapper executable
        run: chmod +x mvnw
      - name: Verify backend
        run: ./mvnw --batch-mode clean verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build
      - run: npm run build:admin

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: alveryn
          POSTGRES_USER: alveryn
          POSTGRES_PASSWORD: alveryn_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alveryn -d alveryn"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: jdbc:postgresql://localhost:5432/alveryn
      DB_USERNAME: alveryn
      DB_PASSWORD: alveryn_ci
      E2E_DB_NAME: alveryn
      E2E_DB_USER: alveryn
      E2E_DB_PASSWORD: alveryn_ci
      E2E_DB_HOST: 127.0.0.1
      E2E_DB_PORT: "5432"
      SPRING_PROFILES_ACTIVE: local,e2e
      ALVERYN_E2E_BASE_URL: http://127.0.0.1:5173
      ALVERYN_E2E_API_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start backend
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode spring-boot:run > ../backend-e2e.log 2>&1 &
      - name: Start frontend
        working-directory: frontend
        run: npm run dev -- --host 127.0.0.1 > ../frontend-e2e.log 2>&1 &
      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e
      - name: Print e2e service logs
        if: failure()
        run: |
          echo "==== backend-e2e.log ===="
          tail -n 300 backend-e2e.log || true
          echo "==== frontend-e2e.log ===="
          tail -n 300 frontend-e2e.log || true
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
            backend-e2e.log
            frontend-e2e.log
