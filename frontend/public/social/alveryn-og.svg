      <stop stop-color="#F4C95D" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F4C95D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="670" y1="128" x2="1080" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171717"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <filter id="shadow" x="610" y="70" width="570" height="520" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="72" y="75" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" letter-spacing="9">ALVERYN</text>
  <text x="72" y="216" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">
    <tspan x="72" dy="0">Track the work.</tspan>
    <tspan x="72" dy="65">Know the hours.</tspan>
    <tspan x="72" dy="65">Understand the money.</tspan>
  </text>
  <text x="72" y="470" fill="#A3A3A3" font-family="Arial, Helvetica, sans-serif" font-size="25">
    <tspan x="72" dy="0">Hours, completed work, earnings and absences</tspan>
    <tspan x="72" dy="38">in one reliable record.</tspan>
  </text>
  <g filter="url(#shadow)">
