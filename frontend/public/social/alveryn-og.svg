    <rect x="690" y="226" width="184" height="110" rx="20" fill="#0A0A0A" stroke="#333"/>
    <text x="714" y="259" fill="#888" font-family="Arial, Helvetica, sans-serif" font-size="14">RECORDED TIME</text>
    <text x="714" y="308" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">7h 45m</text>
    <rect x="894" y="226" width="186" height="110" rx="20" fill="#1B1709" stroke="#665218"/>
    <text x="918" y="259" fill="#B8A36B" font-family="Arial, Helvetica, sans-serif" font-size="14">EARNINGS</text>
    <text x="918" y="308" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">€168.40</text>
    <rect x="690" y="356" width="390" height="124" rx="20" fill="#090909" stroke="#292929"/>
    <rect x="714" y="382" width="5" height="34" rx="2.5" fill="#F4C95D"/>
    <text x="735" y="397" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600">Morning shift</text>
    <text x="735" y="417" fill="#777" font-family="Arial, Helvetica, sans-serif" font-size="13">6h 30m · €19.20/hour</text>
    <text x="1006" y="405" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">€124.80</text>
    <rect x="714" y="432" width="5" height="28" rx="2.5" fill="#6DD5FA"/>
    <text x="735" y="450" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600">24 deliveries</text>
    <text x="1006" y="450" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">€43.60</text>
