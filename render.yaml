services:
  - type: web
    name: alveryn-web
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    domains:
      - alveryn.com
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.alveryn.com
      - key: VITE_ENABLE_PREVIEW_ROUTES
        value: false
      - key: VITE_SUPPORT_EMAIL
        value: studio365media@gmail.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /manifest.webmanifest
        name: Cache-Control
        value: public, max-age=3600
      - path: /sw.js
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: alveryn-admin
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build:admin
    staticPublishPath: dist-admin
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.alveryn.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: alveryn-api
    runtime: docker
    branch: main
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: commit
    domains:
      - api.alveryn.com
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: DB_URL
        fromDatabase:
          name: alveryn-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: alveryn-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: alveryn-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FOUNDER_EMAIL
        value: eusebiujacot@gmail.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://alveryn.com,https://www.alveryn.com,https://alveryn-admin.onrender.com
      - key: FRONTEND_VERIFICATION_URL
        value: https://alveryn.com/verify-email
      - key: GOOGLE_OAUTH_FRONTEND_SUCCESS_URL
        value: https://alveryn.com/auth/oauth/callback
      - key: GOOGLE_OAUTH_FRONTEND_FAILURE_URL
        value: https://alveryn.com/login?oauth=error
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://api.alveryn.com/api/auth/oauth/google/callback
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        value: studio365media@gmail.com
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_STARTTLS
        value: true
      - key: REFRESH_COOKIE_SECURE
        value: true
      - key: REFRESH_COOKIE_SAME_SITE
        value: None

databases:
  - name: alveryn-db
    databaseName: alveryn
    user: alveryn
    region: frankfurt
