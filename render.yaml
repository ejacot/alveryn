services:
  - type: web
    name: roomly-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        fromDatabase:
          name: roomly-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: roomly-db
          property: password

databases:
  - name: roomly-db
    databaseName: roomly
    user: roomly
